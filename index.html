<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapido Binge</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #fff;
    font-family: Arial, sans-serif;
  }

  .landing {
    width: 100%;
    max-width: 500px;
    margin: 0 auto; 
    
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    
    display: flex;
    flex-direction: column;
    align-items: center;
    
    padding: 40px 0px 40px 0px;
    gap: 0px; 
    background: #143775;
  }

  .bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .logo, .heading, .video-box, .cta {
    position: relative;
    z-index: 2;
    display: block; 
  }

  .logo {
    width: 120px;
  }

  .heading {
    width: 90%;
    margin-top: 35px;

  }

  .video-box {
    width: 100%;
    overflow: hidden;
    cursor: pointer;
    
}

  .thumbnail {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .playBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #d92727;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform .3s;
  }

  .playBtn:hover {
    transform: translate(-50%, -50%) scale(1.08);
  }

  /* SVG Icon Styling */
  .play-icon {
    width: 35px;
    height: 35px;
    fill: #fff;
    margin-left: 5px; /* Visually centers the triangle inside the circle */
  }

  .cta {
    width: 100%;
    cursor: pointer;
    transition: transform .25s;
  }

  .cta:hover {
    transform: scale(1.03);
  }

  /* Popup Styles */
  #videoPopup {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .videoWrapper {
    position: relative;
    width: 92%;
    max-width: 900px;
  }

  video {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  #closeVideo {
    position: absolute;
    right: 0px;
    top: -40px;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
  }

  /* Mobile Responsive */
  @media(max-width: 600px) { 
    body{
      background:#113879;
    }
   
    .landing {
      border-radius: 0;
      box-shadow: none;
      padding: 20px 00px 40px 00px; 
      gap: 0px; 
    }
    
    .logo {
      width: 100px;
    }
    
    .heading {
      width: 95%;
    }
    
    .video-box {
      width: 100%;
    }
    
    .playBtn {
      width: 40px;
      height: 40px;
    }

    /* Scales down the SVG for mobile */
    .play-icon {
      width: 24px;
      height: 24px;
      margin-left: 3px; 
    }
    
    .cta {
      width: 85%; 
    }
  }
</style>
</head>

<body>

<div class="landing">
    <img src="Asset01_bg_Binge_landing_page.jpg" class="bg" alt="Background">

    <img src="rapido_logo.png" class="logo" alt="Logo">
    <img src="Asset02_Binge_landing_page.png" class="heading" alt="Heading">

    <div class="video-box" id="videoBoxTrig">
        <img src="Asset04_video_screenshot_landing_page.png" class="thumbnail" alt="Thumbnail">
        <div class="playBtn" id="playVideo">
            <svg viewBox="0 0 24 24" class="play-icon">
                <path d="M8 5v14l11-7z" />
            </svg>
        </div>
    </div>

    <img src="Asset03_Binge_landing_page.png" class="cta" id="ctaBtn" alt="Call to action">
</div>

<div id="videoPopup">
    <div class="videoWrapper">
        <span id="closeVideo">✕</span>
        <video id="promoVideo" controls preload="metadata">
            <source src="Pritam.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
  const popup = document.getElementById("videoPopup");
  const video = document.getElementById("promoVideo");

  // Attach click events
  document.getElementById("playVideo").onclick = openVideo;
  document.getElementById("videoBoxTrig").onclick = openVideo;
  document.getElementById("ctaBtn").onclick = openVideo;
  document.getElementById("closeVideo").onclick = closeVideo;

  function openVideo() {
    popup.style.display = "flex";
    video.currentTime = 0;
    video.play();
  }

  function closeVideo() {
    video.pause();
    popup.style.display = "none";
  }

  // Close popup if clicked outside the video container
  window.onclick = function(e) {
    if (e.target === popup) {
      closeVideo();
    }
  }
</script>

</body>
</html>
